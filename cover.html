<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:900px;height:383px;overflow:hidden;
  font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif}
.bg{position:absolute;inset:0;
  background:linear-gradient(160deg,#052e2b 0%,#04211f 50%,#0a1a14 100%)}
.top-accent{position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#2dd4bf,#34d399,#fbbf24,#f87171)}
.left{position:absolute;left:50px;top:0;bottom:0;width:370px;
  display:flex;flex-direction:column;justify-content:center}
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(45,212,191,.18);
  border:1px solid rgba(45,212,191,.45);border-radius:4px;padding:4px 10px;
  font-size:11px;color:#5eead4;letter-spacing:1px;margin-bottom:16px;width:fit-content}
.title{font-size:31px;font-weight:900;color:#fff;line-height:1.3;letter-spacing:.5px}
.title .hi{color:#fbbf24}
.title .hi2{color:#f87171}
.sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:14px;line-height:1.8}
.sub b{color:rgba(255,255,255,.85)}
.divider{position:absolute;left:445px;top:50px;bottom:74px;width:1px;background:rgba(255,255,255,.08)}
.right{position:absolute;right:36px;top:52px;width:395px;display:flex;flex-direction:column;gap:7px}
.chain-label{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;margin-bottom:4px}
.chain-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:7px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)}
.chain-row.highlight{background:rgba(248,113,113,.14);border-color:rgba(248,113,113,.35)}
.chain-row.best{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.35)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.c-name{flex:1;font-size:12px;color:rgba(255,255,255,.8)}
.c-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.conclusion{position:absolute;bottom:20px;right:36px;left:50px;
  display:flex;justify-content:space-between;align-items:center}
.conc-item{text-align:center}
.conc-num{font-size:23px;font-weight:900}
.conc-label{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.sep{width:1px;height:36px;background:rgba(255,255,255,.1)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="top-accent"></div>
<div class="left">
  <div class="tag">🧘 解压方式科学评级器</div>
  <div class="title">
    刷手机<span class="hi2">不是解压</span><br>
    是在给焦虑<br>
    <span class="hi">充值</span>
  </div>
  <div class="sub">
    20+ 种解压方式按研究证据打分<br>
    你今天是在 <b>还债</b>，还是 <b>借新债</b>？
  </div>
</div>
<div class="divider"></div>
<div class="right">
  <div class="chain-label">每分钟解压效率排行（正=充电，负=借债）</div>
  <div class="chain-row best">
    <div class="dot" style="background:#34d399"></div>
    <span class="c-name">快走 / 运动</span>
    <span class="c-val" style="color:#34d399">+2.6</span>
  </div>
  <div class="chain-row best">
    <div class="dot" style="background:#5eead4"></div>
    <span class="c-name">音乐疗愈（性价比之王）</span>
    <span class="c-val" style="color:#5eead4">+2.4</span>
  </div>
  <div class="chain-row">
    <div class="dot" style="background:#fbbf24"></div>
    <span class="c-name">捏捏乐 ⚠️超标率100%</span>
    <span class="c-val" style="color:#fbbf24">+1.0</span>
  </div>
  <div class="chain-row highlight">
    <div class="dot" style="background:#f87171"></div>
    <span class="c-name">刷手机 / 刷短视频</span>
    <span class="c-val" style="color:#f87171">−1.2</span>
  </div>
  <div class="chain-row highlight">
    <div class="dot" style="background:#ef4444"></div>
    <span class="c-name">刷负面新闻 doomscrolling</span>
    <span class="c-val" style="color:#ef4444">−1.8</span>
  </div>
</div>
<div class="conclusion">
  <div class="conc-item">
    <div class="conc-num" style="color:#f87171">−72</div>
    <div class="conc-label">刷手机1小时</div>
  </div>
  <div class="sep"></div>
  <div class="conc-item">
    <div class="conc-num" style="color:#34d399">+228</div>
    <div class="conc-label">换成快走净赚</div>
  </div>
  <div class="sep"></div>
  <div class="conc-item">
    <div class="conc-num" style="color:#fbbf24">−0.4~−0.8</div>
    <div class="conc-label">音乐降焦虑效应量</div>
  </div>
  <div class="sep"></div>
  <div class="conc-item" style="text-align:right">
    <div style="font-size:10px;color:rgba(255,255,255,.3)">wei011/jieya-lab</div>
    <div style="font-size:9px;color:rgba(255,255,255,.2);margin-top:2px">口径：RCT荟萃·皮质醇研究</div>
  </div>
</div>
</body>
</html>
